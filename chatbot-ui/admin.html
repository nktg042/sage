<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindEase — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09120e;
      --surface: #111e17;
      --surface-2: #16281e;
      --text: #f0ede8;
      --text-dim: #9aab9e;
      --accent: #4ade80;
    }
    body {
      margin: 0; padding: 40px; font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
    }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--surface-2); padding: 30px; border-radius: 16px;
      text-align: center;
    }
    .card h2 { margin: 0 0 10px 0; font-size: 16px; color: var(--text-dim); font-weight: 600; }
    .card .val { font-size: 42px; font-weight: 700; color: var(--accent); }
    a.back { color: var(--accent); text-decoration: none; font-size: 14px; position:absolute; top:40px; left:40px; }
    .nav { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <a href="index.html" class="back">← Back to App</a>
  <div style="text-align:center; margin-top:20px;">
    <h1 style="font-size:28px;">MindEase Admin Dashboard</h1>
    <p style="color:var(--text-dim)">Live statistics from MongoDB Atlas</p>
  </div>
  
  <div class="grid" id="statsGrid">
    <div class="card"><h2>Registered Users</h2><div class="val" id="usersVal">-</div></div>
    <div class="card"><h2>Total Sessions</h2><div class="val" id="sessionsVal">-</div></div>
    <div class="card"><h2>Total Messages</h2><div class="val" id="messagesVal">-</div></div>
    <div class="card"><h2>Crises Handled</h2><div class="val" id="crisesVal">-</div></div>
  </div>

  <script>
    async function loadStats() {
      try {
        const token = localStorage.getItem('mindease_token');
        const res = await fetch('http://127.0.0.1:8000/admin/stats', {
          headers: token ? { 'Authorization': 'Bearer ' + token } : {}
        });
        const data = await res.json();
        if(res.ok) {
          document.getElementById('usersVal').innerText = data.users;
          document.getElementById('sessionsVal').innerText = data.sessions;
          document.getElementById('messagesVal').innerText = data.messages;
          document.getElementById('crisesVal').innerText = data.crises;
        } else {
          document.getElementById('statsGrid').innerHTML = `<p style="text-align:center; width:100%; color:#f87171;">Failed to load stats. Ensure API is running.</p>`;
        }
      } catch (err) {
        console.error(err);
      }
    }
    loadStats();
  </script>
</body>
</html>
